<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>공강 녹이기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">⏰ 공강 녹이기</div>
    <nav>
      <a href="#">홈</a>
      <a href="#">내 주변</a>
      <a href="#">이벤트</a>
      <a href="#" class="profile">👤</a>
    </nav>
  </header>

  <section class="banner">
    <h1>공강을 알차게 보내는 법!</h1>
    <p>오늘 공강 시간, 알차게 보내세요!</p>
  </section>

  <main class="cards">
    <div class="card">
      <h2>학식 자리 안내</h2>
      <p>현재 학식식당 자리를 확인해보세요</p>
    </div>

    <div class="card">
      <h2>도서관 자리 추천</h2>
      <p>남은 도서관 자리를 보여드립니다</p>
    </div>

    <div class="card clickable" id="chat-card">
      <h2>랜덤채팅</h2>
      <p>공강시간에 랜덤 채팅 즐기기</p>
    </div>

    <div class="card">
      <h2>주변 추천 장소</h2>
      <p>공강시간에 가기 좋은 장소 추천</p>
    </div>
  </main>

  <footer>
    <p>© 2026 공강 녹이기</p>
  </footer>

  <script src="index.js"></script>
</body>
</html>
